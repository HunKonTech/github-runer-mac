name: Build And Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: read

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: Face-Local

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.meta.outputs.base_version }}
      package_version: ${{ steps.meta.outputs.package_version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      macos_runs_on: ${{ steps.macos_runner.outputs.macos_runs_on }}
      macos_runner_note: ${{ steps.macos_runner.outputs.macos_runner_note }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - id: meta
        shell: bash
        run: |
          BASE_VERSION="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as fh:
              print(tomllib.load(fh)["project"]["version"])
          PY
          )"
          PACKAGE_VERSION="${BASE_VERSION}+build.${GITHUB_RUN_NUMBER}"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="main-build-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          RELEASE_NAME="Face-Local main build ${BASE_VERSION} (${SHORT_SHA})"

          {
            echo "base_version=$BASE_VERSION"
            echo "package_version=$PACKAGE_VERSION"
            echo "tag=$TAG"
            echo "release_name=$RELEASE_NAME"
          } >> "$GITHUB_OUTPUT"

      - id: macos_runner
        env:
          RUNNER_DISCOVERY_TOKEN: ${{ secrets.RUNNER_DISCOVERY_TOKEN }}
          DEFAULT_GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          RUNNER_JSON='"macos-latest"'
          RUNNER_NOTE="Using GitHub-hosted macOS runner (fallback)."
          TOKEN_TO_USE="${RUNNER_DISCOVERY_TOKEN:-$DEFAULT_GITHUB_TOKEN}"
          export GH_TOKEN="$TOKEN_TO_USE"
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          RESPONSE_FILE="$(mktemp)"
          ERROR_FILE="$(mktemp)"
          FOUND_MATCH=""

          query_and_match() {
            local endpoint="$1"

            if gh api \
              -H "Accept: application/vnd.github+json" \
              "$endpoint" >"$RESPONSE_FILE" 2>"$ERROR_FILE"; then
              MATCH="$(RUNNERS_JSON="$(cat "$RESPONSE_FILE")" python - <<'PY'
          import json
          import os

          data = json.loads(os.environ["RUNNERS_JSON"])
          target_labels = {"self-hosted", "macOS", "ARM64"}
          target_name = "Koncsik-MacBook-Air"

          for runner in data.get("runners", []):
              labels = {label["name"] for label in runner.get("labels", [])}
              if (
                  runner.get("status") == "online"
                  and not runner.get("busy", False)
                  and (
                      runner.get("name") == target_name
                      or target_labels.issubset(labels)
                  )
              ):
                  print(json.dumps(["self-hosted", "macOS", "ARM64"]))
                  raise SystemExit(0)

          raise SystemExit(1)
          PY
              )" || true

              if [ -n "$MATCH" ]; then
                FOUND_MATCH="$MATCH"
                return 0
              fi

              return 1
            fi

            return 2
          }

          query_and_match "/repos/${OWNER}/${REPO}/actions/runners" || true

          if [ -z "$FOUND_MATCH" ]; then
            query_and_match "/orgs/${OWNER}/actions/runners" || true
          fi

          if [ -n "$FOUND_MATCH" ]; then
            RUNNER_JSON="$FOUND_MATCH"
            RUNNER_NOTE="Using self-hosted macOS ARM64 runner."
          fi

          echo "macos_runs_on=$RUNNER_JSON" >> "$GITHUB_OUTPUT"
          echo "macos_runner_note=$RUNNER_NOTE" >> "$GITHUB_OUTPUT"
          echo "$RUNNER_NOTE"

          if [ -z "$FOUND_MATCH" ]; then
            echo "No eligible self-hosted macOS ARM64 runner was discoverable. Falling back to macos-latest." >&2
            if [ -s "$ERROR_FILE" ]; then
              cat "$ERROR_FILE" >&2
            fi
            echo "Tip: set repository secret RUNNER_DISCOVERY_TOKEN with repo admin read access, or admin:org if the runner is org-level." >&2
          fi

  build-macos:
    needs: prepare
    runs-on: ${{ fromJSON(needs.prepare.outputs.macos_runs_on) }}
    steps:
      - uses: actions/checkout@v6

      - name: Selected macOS runner
        shell: bash
        run: echo "${{ needs.prepare.outputs.macos_runner_note }}"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install . pyinstaller

      - name: Build bundled app
        shell: bash
        run: python scripts/package_app.py --version "${{ needs.prepare.outputs.package_version }}"

      - name: Create release directory
        shell: bash
        run: mkdir -p release

      - name: Package macOS app
        shell: bash
        run: |
          ditto -c -k --keepParent "dist/Face-Local.app" "release/Face-Local-macOS-app-${{ needs.prepare.outputs.package_version }}.zip"
          rm -rf release/dmg-root
          mkdir -p release/dmg-root
          cp -R "dist/Face-Local.app" "release/dmg-root/"
          ln -s /Applications "release/dmg-root/Applications"
          hdiutil create \
            -volname "Face-Local" \
            -srcfolder "release/dmg-root" \
            -ov \
            -format UDZO \
            "release/Face-Local-macOS-installer-${{ needs.prepare.outputs.package_version }}.dmg"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          if-no-files-found: error
          path: release/*

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install . pyinstaller

      - name: Build bundled app
        shell: bash
        run: python scripts/package_app.py --version "${{ needs.prepare.outputs.package_version }}"

      - name: Create release directory
        shell: bash
        run: mkdir -p release

      - name: Package Windows installer
        shell: powershell
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=${{ needs.prepare.outputs.package_version }}" "scripts\build_windows_installer.iss"
          Compress-Archive -Path "dist\Face-Local\*" -DestinationPath "release\Face-Local-windows-portable-${{ needs.prepare.outputs.package_version }}.zip" -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          if-no-files-found: error
          path: release/*

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install Linux packaging dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev libgl1 libglib2.0-0 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install . pyinstaller

      - name: Build bundled app
        shell: bash
        run: python scripts/package_app.py --version "${{ needs.prepare.outputs.package_version }}"

      - name: Create release directory
        shell: bash
        run: mkdir -p release

      - name: Package Linux installer
        shell: bash
        run: |
          chmod +x scripts/build_linux_deb.sh
          scripts/build_linux_deb.sh "${{ needs.prepare.outputs.package_version }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          if-no-files-found: error
          path: release/*

  release:
    needs:
      - prepare
      - build-macos
      - build-windows
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        shell: bash
        run: |
          mapfile -t files < <(find release-assets -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets were produced." >&2
            exit 1
          fi

          notes=$'Automated cross-platform build from `main`.\n\n'
          notes+="- Commit: ${GITHUB_SHA}"$'\n'
          notes+="- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"$'\n'
          notes+="- macOS runner: ${{ needs.prepare.outputs.macos_runner_note }}"$'\n'

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${files[@]}" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_NAME" \
              --notes "$notes" \
              --prerelease
          fi
