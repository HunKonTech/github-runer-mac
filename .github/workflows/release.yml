name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix (example: 1.0.0)"
        required: true
        type: string
      release_name:
        description: "Optional custom release title"
        required: false
        type: string
      prerelease:
        description: "Create this as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

env:
  APP_NAME: GitRunnerManager
  OWNER: HunKonTech

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.meta.outputs.package_version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v6

      - id: meta
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            PACKAGE_VERSION="${INPUT_VERSION#v}"
            if ! [[ "$PACKAGE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "workflow_dispatch version must be semver x.y.z, got: $PACKAGE_VERSION" >&2
              exit 1
            fi

            TAG="v${PACKAGE_VERSION}"
            RELEASE_NAME="${INPUT_RELEASE_NAME:-${APP_NAME} v${PACKAGE_VERSION}}"
            PRERELEASE="${INPUT_PRERELEASE:-false}"
          else
            git fetch --tags --force
            PACKAGE_VERSION="$(
              python3 - <<'PY'
          import re
          import subprocess

          default_version = (1, 0, 0)
          latest_version = None

          tags = subprocess.check_output(
              ["git", "tag", "--list", "v*"],
              text=True,
          ).splitlines()

          for tag in tags:
              match = re.fullmatch(r"v(\d+)\.(\d+)\.(\d+)", tag.strip())
              if not match:
                  continue

              version = tuple(int(part) for part in match.groups())
              if latest_version is None or version > latest_version:
                  latest_version = version

          if latest_version is None:
              print("1.0.0")
          else:
              major, minor, patch = latest_version
              print(f"{major}.{minor}.{patch + 1}")
          PY
            )"
            TAG="v${PACKAGE_VERSION}"
            RELEASE_NAME="${APP_NAME} v${PACKAGE_VERSION}"
            PRERELEASE="false"
          fi

          {
            echo "package_version=$PACKAGE_VERSION"
            echo "tag=$TAG"
            echo "release_name=$RELEASE_NAME"
            echo "prerelease=$PRERELEASE"
          } >> "$GITHUB_OUTPUT"

  pick-runners:
    name: Pick build runners
    runs-on: ubuntu-latest
    outputs:
      mac_runner: ${{ steps.pick_mac.outputs.runner }}
      windows_runner: ${{ steps.pick_windows.outputs.runner }}
      linux_runner: ${{ steps.pick_linux.outputs.runner }}
    steps:
      - name: Pick macOS runner
        id: pick_mac
        env:
          GH_TOKEN: ${{ secrets.RUNNER_ADMIN_TOKEN }}
          OWNER: HunKonTech
        run: |
          STATUS=$(gh api "orgs/${OWNER}/actions/runners" \
            --jq '.runners[] | select(.name == "Koncsik-MacBook-Air") | .status' 2>/dev/null || echo "")
          if [ "$STATUS" = "online" ]; then
            echo 'runner=["self-hosted","macOS","ARM64"]' >> "$GITHUB_OUTPUT"
            echo "macOS Runner: Koncsik-MacBook-Air (online)"
          else
            echo 'runner=["macos-latest"]' >> "$GITHUB_OUTPUT"
            echo "macOS Runner: macos-latest (fallback)"
          fi

      - name: Pick Windows runner
        id: pick_windows
        env:
          GH_TOKEN: ${{ secrets.RUNNER_ADMIN_TOKEN }}
          OWNER: HunKonTech
        run: |
          STATUS=$(gh api "orgs/${OWNER}/actions/runners" \
            --jq '.runners[] | select(.name == "nagy_gep_windows") | .status' 2>/dev/null || echo "")
          if [ "$STATUS" = "online" ]; then
            echo 'runner=["self-hosted","Windows","X64"]' >> "$GITHUB_OUTPUT"
            echo "Windows Runner: nagy_gep_windows (online)"
          else
            echo 'runner=["windows-latest"]' >> "$GITHUB_OUTPUT"
            echo "Windows Runner: windows-latest (fallback)"
          fi

      - name: Pick Linux runner
        id: pick_linux
        shell: bash
        run: |
          echo 'runner=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
          echo "Linux Runner: ubuntu-latest"

  build-macos:
    name: Build macOS App
    needs:
      - prepare
      - pick-runners
    runs-on: ${{ fromJSON(needs.pick-runners.outputs.mac_runner) }}
    steps:
      - uses: actions/checkout@v6

      - name: Selected macOS runner
        shell: bash
        run: echo '${{ needs.pick-runners.outputs.mac_runner }}'

      - name: Select Xcode 16 on GitHub-hosted macOS
        if: ${{ !contains(needs.pick-runners.outputs.mac_runner, 'self-hosted') }}
        shell: bash
        run: |
          XCODE_APP="$(find /Applications -maxdepth 1 -type d -name 'Xcode_16*.app' | sort -V | tail -n 1)"
          if [ -z "$XCODE_APP" ]; then
            echo "Xcode 16 is not available on this runner image." >&2
            ls -1 /Applications | grep '^Xcode' || true
            exit 1
          fi

          sudo xcode-select -s "$XCODE_APP/Contents/Developer"

      - name: Show toolchain versions
        shell: bash
        run: |
          xcodebuild -version
          swift --version

      - name: Build macOS sources
        shell: bash
        run: swift build --package-path swfit --jobs 1

      - name: Build app bundle
        shell: bash
        run: APP_VERSION="${{ needs.prepare.outputs.package_version }}" BUILD_CONFIGURATION=release ./scripts/build_and_run_swift.sh --bundle

      - name: Build DMG installer
        shell: bash
        run: APP_VERSION="${{ needs.prepare.outputs.package_version }}" ./scripts/build_dmg_swfit.sh

      - name: Check artifact upload connectivity
        if: ${{ contains(needs.pick-runners.outputs.mac_runner, 'self-hosted') }}
        shell: bash
        run: |
          for host in results-receiver.actions.githubusercontent.com github.com api.github.com codeload.github.com; do
            echo "Checking $host"
            dscacheutil -q host -a name "$host" >/dev/null
            curl --silent --show-error --head --max-time 15 "https://$host" >/dev/null
          done

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-native-macos
          path: release/GitRunnerManager-macOS-*-${{ needs.prepare.outputs.package_version }}.dmg
          if-no-files-found: error

  build-avalonia-macos:
    name: Build Avalonia macOS App
    needs:
      - prepare
      - pick-runners
    runs-on: ${{ fromJSON(needs.pick-runners.outputs.mac_runner) }}
    steps:
      - uses: actions/checkout@v6

      - name: Selected macOS runner
        shell: bash
        run: echo '${{ needs.pick-runners.outputs.mac_runner }}'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Avalonia macOS app
        shell: bash
        run: APP_VERSION="${{ needs.prepare.outputs.package_version }}" bash ./scripts/publish-macos-arm64.sh
        working-directory: Avalonia

      - name: Package Avalonia macOS app
        shell: bash
        run: |
          mkdir -p release
          tar -czf "release/GitRunnerManager-Avalonia-macOS-arm64-${{ needs.prepare.outputs.package_version }}.tar.gz" -C publish/macos-arm64 .
        working-directory: Avalonia

      - name: Check artifact upload connectivity
        if: ${{ contains(needs.pick-runners.outputs.mac_runner, 'self-hosted') }}
        shell: bash
        run: |
          for host in results-receiver.actions.githubusercontent.com github.com api.github.com codeload.github.com; do
            echo "Checking $host"
            dscacheutil -q host -a name "$host" >/dev/null
            curl --silent --show-error --head --max-time 15 "https://$host" >/dev/null
          done

      - name: Upload Avalonia macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-avalonia-macos
          path: Avalonia/release/GitRunnerManager-Avalonia-macOS-arm64-${{ needs.prepare.outputs.package_version }}.tar.gz
          if-no-files-found: error

  build-avalonia-windows:
    name: Build Avalonia Windows App
    needs:
      - prepare
      - pick-runners
    runs-on: ${{ fromJSON(needs.pick-runners.outputs.windows_runner) }}
    steps:
      - uses: actions/checkout@v6

      - name: Selected Windows runner
        shell: powershell
        run: Write-Output '${{ needs.pick-runners.outputs.windows_runner }}'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Avalonia Windows app
        shell: powershell
        run: |
          $env:APP_VERSION = "${{ needs.prepare.outputs.package_version }}"
          $git = (Get-Command git.exe -ErrorAction Stop).Source
          $gitRoot = Split-Path (Split-Path $git -Parent) -Parent
          $bash = Join-Path $gitRoot "bin\bash.exe"
          if (-not (Test-Path $bash)) {
            throw "Git Bash not found next to git.exe: $bash"
          }
          & $bash ./scripts/publish-windows-x64.sh
        working-directory: Avalonia

      - name: Package Avalonia Windows app
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path publish/win-x64/* -DestinationPath "release/GitRunnerManager-Avalonia-Windows-x64-${{ needs.prepare.outputs.package_version }}.zip" -Force
        working-directory: Avalonia

      - name: Upload Avalonia Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-avalonia-windows
          path: Avalonia/release/GitRunnerManager-Avalonia-Windows-x64-${{ needs.prepare.outputs.package_version }}.zip
          if-no-files-found: error

  build-avalonia-windows-arm64:
    name: Build Avalonia Windows ARM64 App
    needs:
      - prepare
      - pick-runners
    runs-on: ${{ fromJSON(needs.pick-runners.outputs.windows_runner) }}
    steps:
      - uses: actions/checkout@v6

      - name: Selected Windows runner
        shell: powershell
        run: Write-Output '${{ needs.pick-runners.outputs.windows_runner }}'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Avalonia Windows ARM64 app
        shell: powershell
        run: |
          $env:APP_VERSION = "${{ needs.prepare.outputs.package_version }}"
          $git = (Get-Command git.exe -ErrorAction Stop).Source
          $gitRoot = Split-Path (Split-Path $git -Parent) -Parent
          $bash = Join-Path $gitRoot "bin\bash.exe"
          if (-not (Test-Path $bash)) {
            throw "Git Bash not found next to git.exe: $bash"
          }
          & $bash ./scripts/publish-windows-arm64.sh
        working-directory: Avalonia

      - name: Package Avalonia Windows ARM64 app
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path publish/win-arm64/* -DestinationPath "release/GitRunnerManager-Avalonia-Windows-arm64-${{ needs.prepare.outputs.package_version }}.zip" -Force
        working-directory: Avalonia

      - name: Upload Avalonia Windows ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-avalonia-windows-arm64
          path: Avalonia/release/GitRunnerManager-Avalonia-Windows-arm64-${{ needs.prepare.outputs.package_version }}.zip
          if-no-files-found: error

  build-avalonia-linux:
    name: Build Avalonia Linux App
    needs:
      - prepare
      - pick-runners
    runs-on: ${{ fromJSON(needs.pick-runners.outputs.linux_runner) }}
    steps:
      - uses: actions/checkout@v6

      - name: Selected Linux runner
        shell: bash
        run: echo '${{ needs.pick-runners.outputs.linux_runner }}'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Avalonia Linux app
        shell: bash
        run: APP_VERSION="${{ needs.prepare.outputs.package_version }}" bash ./scripts/publish-linux-x64.sh
        working-directory: Avalonia

      - name: Package Avalonia Linux app
        shell: bash
        run: |
          mkdir -p release
          tar -czf "release/GitRunnerManager-Avalonia-Linux-x64-${{ needs.prepare.outputs.package_version }}.tar.gz" -C publish/linux-x64 .
        working-directory: Avalonia

      - name: Upload Avalonia Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-avalonia-linux
          path: Avalonia/release/GitRunnerManager-Avalonia-Linux-x64-${{ needs.prepare.outputs.package_version }}.tar.gz
          if-no-files-found: error

  build-avalonia-linux-arm64:
    name: Build Avalonia Linux ARM64 App
    needs:
      - prepare
      - pick-runners
    runs-on: ${{ fromJSON(needs.pick-runners.outputs.linux_runner) }}
    steps:
      - uses: actions/checkout@v6

      - name: Selected Linux runner
        shell: bash
        run: echo '${{ needs.pick-runners.outputs.linux_runner }}'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Avalonia Linux ARM64 app
        shell: bash
        run: APP_VERSION="${{ needs.prepare.outputs.package_version }}" bash ./scripts/publish-linux-arm64.sh
        working-directory: Avalonia

      - name: Package Avalonia Linux ARM64 app
        shell: bash
        run: |
          mkdir -p release
          tar -czf "release/GitRunnerManager-Avalonia-Linux-arm64-${{ needs.prepare.outputs.package_version }}.tar.gz" -C publish/linux-arm64 .
        working-directory: Avalonia

      - name: Upload Avalonia Linux ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-avalonia-linux-arm64
          path: Avalonia/release/GitRunnerManager-Avalonia-Linux-arm64-${{ needs.prepare.outputs.package_version }}.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs:
      - prepare
      - build-macos
      - build-avalonia-macos
      - build-avalonia-windows
      - build-avalonia-windows-arm64
      - build-avalonia-linux
      - build-avalonia-linux-arm64
    if: ${{ always() && needs.build-macos.result == 'success' && needs.build-avalonia-macos.result == 'success' && needs.build-avalonia-windows.result == 'success' && needs.build-avalonia-windows-arm64.result == 'success' && needs.build-avalonia-linux.result == 'success' && needs.build-avalonia-linux-arm64.result == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      release_url: ${{ steps.release_url.outputs.url }}
    steps:
      - name: Compute release URL
        id: release_url
        shell: bash
        run: |
          echo "url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${{ needs.prepare.outputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          pattern: release-asset-*
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.prepare.outputs.release_name }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          body: |
            GitRunnerManager helps you manage a local GitHub Actions self-hosted runner from a desktop tray/menu bar interface.

            This release is no longer macOS-only: download the native macOS DMG installer or the Avalonia multiplatform builds from the assets below.

            The native macOS app is packaged as a drag-to-Applications installer. The Avalonia builds are published for Windows x64, Windows ARM64, Linux x64, Linux ARM64, and macOS arm64.

            Note: these builds are ad-hoc signed or unsigned. macOS may ask for confirmation the first time an app is opened.

            ---

            A GitRunnerManagerrel helyi GitHub Actions self-hosted runnert kezelhetsz asztali tálcáról vagy menüsorból.

            Ez a release már nem csak macOS-re készült: töltsd le a natív macOS DMG telepítőt vagy az Avalonia multiplatform buildeket az alábbi assetek közül.

            A natív macOS alkalmazás behúzható az Applications mappába. Az Avalonia buildek Windows x64, Windows ARM64, Linux x64, Linux ARM64 és macOS arm64 platformokra készülnek.

            Megjegyzés: ezek a buildek ad-hoc aláírással vagy aláírás nélkül készülnek. A macOS az első indításkor megerősítést kérhet.

          files: release-assets/*

  post-to-buffer:
    name: Post Release Announcement
    needs:
      - prepare
      - build-macos
      - build-avalonia-macos
      - build-avalonia-windows
      - build-avalonia-windows-arm64
      - build-avalonia-linux
      - build-avalonia-linux-arm64
      - release
    if: ${{ needs.release.result == 'success' && github.event_name == 'push' && github.run_attempt == 1 }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Post release announcement via Buffer
        continue-on-error: true
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
          BUFFER_ORGANIZATION_ID: ${{ secrets.BUFFER_ORGANIZATION_ID }}
          BUFFER_CHANNEL_NAME: ${{ secrets.BUFFER_CHANNEL_NAME }}
          BUFFER_CHANNEL_SERVICE: ${{ secrets.BUFFER_CHANNEL_SERVICE }}
          BUFFER_POST_MODE: ${{ secrets.BUFFER_POST_MODE }}
          BUFFER_POST_TEMPLATE: ${{ secrets.BUFFER_POST_TEMPLATE }}
        shell: bash
        run: |
          python3 scripts/post_buffer_release.py \
            --app-name "${APP_NAME}" \
            --tag "${{ needs.prepare.outputs.tag }}" \
            --release-url "${{ needs.release.outputs.release_url }}" \
            --platform "macOS=${{ needs.build-macos.result }}" \
            --platform "Avalonia macOS=${{ needs.build-avalonia-macos.result }}" \
            --platform "Avalonia Windows=${{ needs.build-avalonia-windows.result }}" \
            --platform "Avalonia Windows ARM64=${{ needs.build-avalonia-windows-arm64.result }}" \
            --platform "Avalonia Linux=${{ needs.build-avalonia-linux.result }}" \
            --platform "Avalonia Linux ARM64=${{ needs.build-avalonia-linux-arm64.result }}"
