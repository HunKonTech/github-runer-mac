name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix (example: 1.0.0)"
        required: true
        type: string
      release_name:
        description: "Optional custom release title"
        required: false
        type: string
      prerelease:
        description: "Create this as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

env:
  BUILD_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || format('dev-{0}', github.sha) }}

jobs:
  select-runner:
    name: Select Runner
    runs-on: ubuntu-latest
    outputs:
      use_self_hosted: ${{ steps.pick.outputs.use_self_hosted }}
      selected_runner_name: ${{ steps.pick.outputs.selected_runner_name }}
    steps:
      - name: Check self-hosted runner availability
        id: pick
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.RUNNER_ADMIN_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            try {
              const response = await github.request(
                "GET /repos/{owner}/{repo}/actions/runners",
                { owner, repo }
              );

              const runner = response.data.runners.find((item) => {
                const labels = new Set((item.labels || []).map((label) => label.name));
                return (
                  item.status === "online" &&
                  !item.busy &&
                  labels.has("self-hosted") &&
                  labels.has("macOS") &&
                  labels.has("ARM64")
                );
              });

              core.info(
                `Repository-visible runners: ${response.data.runners
                  .map((item) => `${item.name}[${item.status}, busy=${item.busy}]`)
                  .join(", ")}`
              );

              if (runner) {
                core.info(`Selected self-hosted runner ${runner.name}.`);
                core.setOutput("use_self_hosted", "true");
                core.setOutput("selected_runner_name", runner.name);
              } else {
                core.info("No online idle self-hosted macOS ARM64 runner is currently available for this repository.");
                core.setOutput("use_self_hosted", "false");
                core.setOutput("selected_runner_name", "");
              }
            } catch (error) {
              core.warning(
                `Could not inspect self-hosted runners (${error.status || "unknown"}). Falling back to GitHub-hosted macOS runner.`
              );
              core.setOutput("use_self_hosted", "false");
              core.setOutput("selected_runner_name", "");
            }

  build-self-hosted:
    name: Build on Preferred Self-Hosted Runner
    needs: select-runner
    if: needs.select-runner.outputs.use_self_hosted == 'true'
    runs-on:
      - self-hosted
      - macOS
      - ARM64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build app bundle
        run: APP_VERSION=${{ env.BUILD_VERSION }} ./script/build_and_run.sh --bundle

      - name: Archive app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/GitHubRunnerMenu.app GitHubRunnerMenu-${{ env.BUILD_VERSION }}-macOS-arm64.zip

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset
          path: GitHubRunnerMenu-${{ env.BUILD_VERSION }}-macOS-arm64.zip
          if-no-files-found: error

  build-github-hosted:
    name: Build on GitHub Hosted macOS
    needs: select-runner
    if: needs.select-runner.outputs.use_self_hosted != 'true'
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          XCODE_APP="$(find /Applications -maxdepth 1 -type d -name 'Xcode_16*.app' | sort -V | tail -n 1)"
          if [ -z "$XCODE_APP" ]; then
            echo "Xcode 16 is not available on this runner image." >&2
            ls -1 /Applications | grep '^Xcode' || true
            exit 1
          fi

          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Build app bundle
        run: APP_VERSION=${{ env.BUILD_VERSION }} ./script/build_and_run.sh --bundle

      - name: Archive app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/GitHubRunnerMenu.app GitHubRunnerMenu-${{ env.BUILD_VERSION }}-macOS-arm64.zip

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset
          path: GitHubRunnerMenu-${{ env.BUILD_VERSION }}-macOS-arm64.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs:
      - build-self-hosted
      - build-github-hosted
    if: always() && (needs['build-self-hosted'].result == 'success' || needs['build-github-hosted'].result == 'success')
    runs-on: ubuntu-latest
    outputs:
      release_url: ${{ steps.create_release.outputs.url }}
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-asset
          path: release-assets

      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.BUILD_VERSION }}
          target_commitish: ${{ github.sha }}
          name: ${{ github.event_name == 'workflow_dispatch' && (inputs.release_name != '' && inputs.release_name || format('GitHubRunnerMenu v{0}', inputs.version)) || format('GitHubRunnerMenu {0}', env.BUILD_VERSION) }}
          prerelease: ${{ github.event_name != 'workflow_dispatch' || inputs.prerelease }}
          generate_release_notes: true
          files: release-assets/GitHubRunnerMenu-${{ env.BUILD_VERSION }}-macOS-arm64.zip

  post-to-buffer:
    name: post-to-buffer
    needs:
      - release
    if: ${{ needs.release.result == 'success' && github.event_name == 'push' && github.run_attempt == 1 }}
    runs-on: ubuntu-latest
    env:
      BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
      BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
      BUFFER_ORGANIZATION_ID: ${{ secrets.BUFFER_ORGANIZATION_ID }}
      BUFFER_CHANNEL_NAME: ${{ secrets.BUFFER_CHANNEL_NAME }}
      BUFFER_CHANNEL_SERVICE: ${{ secrets.BUFFER_CHANNEL_SERVICE }}
      BUFFER_POST_MODE: ${{ secrets.BUFFER_POST_MODE }}
      BUFFER_POST_TEMPLATE: ${{ secrets.BUFFER_POST_TEMPLATE }}
      RELEASE_URL: ${{ needs.release.outputs.release_url }}
      RELEASE_VERSION: ${{ format('dev-{0}', github.sha) }}
      RELEASE_NAME: ${{ format('GitHubRunnerMenu dev-{0}', github.sha) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Post release announcement via Buffer
        continue-on-error: true
        run: |
          python3 scripts/post_buffer_release.py \
            --app-name "GitHubRunnerMenu" \
            --tag "v${{ env.BUILD_VERSION }}" \
            --release-url "${{ needs.release.outputs.release_url }}" \
            --platform "macOS=success"
