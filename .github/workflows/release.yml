  release:
    name: Create GitHub Release
    needs:
      - prepare
      - build-macos
    if: ${{ always() && needs.build-macos.result == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      release_url: ${{ steps.release_url.outputs.url }}
    steps:
      - name: Compute release URL
        id: release_url
        shell: bash
        run: |
          echo "url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${{ needs.prepare.outputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.prepare.outputs.release_name }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          body: |
            Automatic app bundle releases are disabled.

            Clone the repository and run:

            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd github-runer-mac
            ./script/build_and_run.sh run
            ```

            To only create the app bundle:

            ```bash
            ./script/build_and_run.sh --bundle
            ```

            The bundle will be available in `dist/GitHubRunnerMenu.app`.

            ---

            Az automatikus alkalmazáscsomag kiadás ki van kapcsolva.

            Clonozd le a repositoryt, majd futtasd:

            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd github-runer-mac
            ./script/build_and_run.sh run
            ```

            Ha csak az alkalmazás bundle kell:

            ```bash
            ./script/build_and_run.sh --bundle
            ```

            Az elkészült bundle itt lesz: `dist/GitHubRunnerMenu.app`.

      # The release asset download/upload flow is intentionally disabled together
      # with automatic .app bundle releases.
      # - name: Download release artifact
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: release-asset
      #     path: release-assets

  post-to-buffer:
    name: Post Release Announcement
    needs:
      - prepare
      - build-macos
      - release
    if: ${{ needs.release.result == 'success' && github.event_name == 'push' && github.run_attempt == 1 }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Post release announcement via Buffer
        continue-on-error: true
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
          BUFFER_ORGANIZATION_ID: ${{ secrets.BUFFER_ORGANIZATION_ID }}
          BUFFER_CHANNEL_NAME: ${{ secrets.BUFFER_CHANNEL_NAME }}
          BUFFER_CHANNEL_SERVICE: ${{ secrets.BUFFER_CHANNEL_SERVICE }}
          BUFFER_POST_MODE: ${{ secrets.BUFFER_POST_MODE }}
          BUFFER_POST_TEMPLATE: ${{ secrets.BUFFER_POST_TEMPLATE }}
        shell: bash
        run: |
          python3 scripts/post_buffer_release.py \
            --app-name "${APP_NAME}" \
            --tag "${{ needs.prepare.outputs.tag }}" \
            --release-url "${{ needs.release.outputs.release_url }}" \
            --platform "macOS=${{ needs.build-macos.result }}"
