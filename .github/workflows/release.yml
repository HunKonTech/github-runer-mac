name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix (example: 1.0.0)"
        required: true
        type: string
      release_name:
        description: "Optional custom release title"
        required: false
        type: string
      prerelease:
        description: "Create this as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

env:
  APP_NAME: GitHubRunnerMenu
  OWNER: HunKonTech

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.meta.outputs.package_version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v6

      - id: meta
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            PACKAGE_VERSION="${INPUT_VERSION#v}"
            if ! [[ "$PACKAGE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "workflow_dispatch version must be semver x.y.z, got: $PACKAGE_VERSION" >&2
              exit 1
            fi

            TAG="v${PACKAGE_VERSION}"
            RELEASE_NAME="${INPUT_RELEASE_NAME:-${APP_NAME} v${PACKAGE_VERSION}}"
            PRERELEASE="${INPUT_PRERELEASE:-false}"
          else
            git fetch --tags --force
            PACKAGE_VERSION="$(
              python3 - <<'PY'
          import re
          import subprocess

          default_version = (1, 0, 0)
          latest_version = None

          tags = subprocess.check_output(
              ["git", "tag", "--list", "v*"],
              text=True,
          ).splitlines()

          for tag in tags:
              match = re.fullmatch(r"v(\d+)\.(\d+)\.(\d+)", tag.strip())
              if not match:
                  continue

              version = tuple(int(part) for part in match.groups())
              if latest_version is None or version > latest_version:
                  latest_version = version

          if latest_version is None:
              print("1.0.0")
          else:
              major, minor, patch = latest_version
              print(f"{major}.{minor}.{patch + 1}")
          PY
            )"
            TAG="v${PACKAGE_VERSION}"
            RELEASE_NAME="${APP_NAME} v${PACKAGE_VERSION}"
            PRERELEASE="false"
          fi

          {
            echo "package_version=$PACKAGE_VERSION"
            echo "tag=$TAG"
            echo "release_name=$RELEASE_NAME"
            echo "prerelease=$PRERELEASE"
          } >> "$GITHUB_OUTPUT"

  pick-runners:
    name: Pick build runners
    runs-on: ubuntu-latest
    outputs:
      mac_runner: ${{ steps.pick_mac.outputs.runner }}
    steps:
      - name: Pick macOS runner
        id: pick_mac
        env:
          GH_TOKEN: ${{ secrets.RUNNER_ADMIN_TOKEN }}
          OWNER: HunKonTech
        run: |
          STATUS=$(gh api "orgs/${OWNER}/actions/runners" \
            --jq '.runners[] | select(.name == "Koncsik-MacBook-Air") | .status' 2>/dev/null || echo "")
          if [ "$STATUS" = "online" ]; then
            echo 'runner=["self-hosted","macOS","ARM64"]' >> "$GITHUB_OUTPUT"
            echo "macOS Runner: Koncsik-MacBook-Air (online)"
          else
            echo 'runner=["macos-latest"]' >> "$GITHUB_OUTPUT"
            echo "macOS Runner: macos-latest (fallback)"
          fi

  build-macos:
    name: Build macOS App
    needs:
      - prepare
      - pick-runners
    runs-on: ${{ fromJSON(needs.pick-runners.outputs.mac_runner) }}
    steps:
      - uses: actions/checkout@v6

      - name: Selected macOS runner
        shell: bash
        run: echo '${{ needs.pick-runners.outputs.mac_runner }}'

      - name: Select Xcode 16 on GitHub-hosted macOS
        if: ${{ !contains(needs.pick-runners.outputs.mac_runner, 'self-hosted') }}
        shell: bash
        run: |
          XCODE_APP="$(find /Applications -maxdepth 1 -type d -name 'Xcode_16*.app' | sort -V | tail -n 1)"
          if [ -z "$XCODE_APP" ]; then
            echo "Xcode 16 is not available on this runner image." >&2
            ls -1 /Applications | grep '^Xcode' || true
            exit 1
          fi

          sudo xcode-select -s "$XCODE_APP/Contents/Developer"

      - name: Show toolchain versions
        shell: bash
        run: |
          xcodebuild -version
          swift --version

        - name: Build macOS sources
          shell: bash
          run: swift build --package-path swfit --jobs 1

        - name: Build app bundle
          shell: bash
          run: APP_VERSION="${{ needs.prepare.outputs.package_version }}" BUILD_CONFIGURATION=release ./scripts/build_and_run_swift.sh --bundle

        - name: Build DMG installer
          shell: bash
          run: APP_VERSION="${{ needs.prepare.outputs.package_version }}" ./scripts/build_dmg_swfit.sh

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-native-macos
          path: release/GitHubRunnerMenu-macOS-*-${{ needs.prepare.outputs.package_version }}.dmg
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs:
      - prepare
      - build-macos
    if: ${{ always() && needs.build-macos.result == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      release_url: ${{ steps.release_url.outputs.url }}
    steps:
      - name: Compute release URL
        id: release_url
        shell: bash
        run: |
          echo "url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${{ needs.prepare.outputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          pattern: release-asset-*
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.prepare.outputs.release_name }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          body: |
            Download the native macOS DMG installer from the assets below.

            The native macOS app is packaged as a drag-to-Applications installer.

            Note: these builds are ad-hoc signed or unsigned. macOS may ask for confirmation the first time an app is opened.

            ---

            Töltsd le a natív macOS DMG telepítőt az alábbi assetek közül.

            A natív macOS alkalmazás behúzható az Applications mappába.

            Megjegyzés: ezek a buildek ad-hoc aláírással vagy aláírás nélkül készülnek. A macOS az első indításkor megerősítést kérhet.

          files: release-assets/*

  post-to-buffer:
    name: Post Release Announcement
    needs:
      - prepare
      - build-macos
      - release
    if: ${{ needs.release.result == 'success' && github.event_name == 'push' && github.run_attempt == 1 }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Post release announcement via Buffer
        continue-on-error: true
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
          BUFFER_ORGANIZATION_ID: ${{ secrets.BUFFER_ORGANIZATION_ID }}
          BUFFER_CHANNEL_NAME: ${{ secrets.BUFFER_CHANNEL_NAME }}
          BUFFER_CHANNEL_SERVICE: ${{ secrets.BUFFER_CHANNEL_SERVICE }}
          BUFFER_POST_MODE: ${{ secrets.BUFFER_POST_MODE }}
          BUFFER_POST_TEMPLATE: ${{ secrets.BUFFER_POST_TEMPLATE }}
        shell: bash
        run: |
          python3 scripts/post_buffer_release.py \
            --app-name "${APP_NAME}" \
            --tag "${{ needs.prepare.outputs.tag }}" \
            --release-url "${{ needs.release.outputs.release_url }}" \
            --platform "macOS=${{ needs.build-macos.result }}"
